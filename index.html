绩单等材料。","缴纳签证费。","打印预约确认单、材料清单等确认材料。"],"materials":["肺结核证明","语言成绩","成绩单","预约确认单","材料清单"],"warnings":["递签时需要带打印好的确认材料。"],"links":["https://www.gov.uk/student-visa/apply"],"sourcePages":"PDF 第 8 页"},{"id":"visa-submission","title":"递签材料","category":"签证与入境","keywords":["递签","签证中心","证件照","护照","无条件Offer","CAS","存款证明","预约单","出签"],"questionExamples":["递签要带什么？","去签证中心要提前多久？","出签要多久？","签证材料有哪些？"],"shortAnswer":"递签需要前往最近的签证中心，建议提前 30 分钟抵达。普通出签大约 15 个工作日，也可以购买加急服务。","steps":["前往离你最近的签证中心。","提前于预约时间 30 分钟抵达。","按要求递交材料。","等待出签。","如有需要，可以购买加急服务，并选择邮寄或自取。"],"materials":["证件照","护照","无条件 Offer 和 CAS","语言成绩单","毕业证","学位证","成绩单","存款证明","肺结核检测报告","签证申请表","预约单","费用支付确认函"],"warnings":["材料清单仅作为参考，最终请与签证老师确认。"],"sourcePages":"PDF 第 9 页"},{"id":"evisa-sharecode","title":"eVisa / Sharecode","category":"签证与入境","keywords":["eVisa","Sharecode","Share code","BRP","电子签证","英国签证","移民局","身份证明"],"questionExamples":["eVisa是什么？","Sharecode在哪里申请？","BRP还有吗？","入境前要申请eVisa吗？"],"shortAnswer":"eVisa 是英国签证与移民局推出的电子签证系统，作为在英期间的身份证明，记录签证与移民信息，已取代 BRP 卡和护照上的签证贴纸。","steps":["进入英国官方 eVisa 网站。","按要求申请或获取 eVisa 访问权限。","入境英国前提前申请 eVisa。","获取有效期内的 Sharecode。"],"links":["https://www.gov.uk/get-access-evisa"],"warnings":["入境英国前务必提前申请 eVisa。","需要确保 Sharecode 在有效期内。"],"sourcePages":"PDF 第 10 页"},{"id":"tuition-payment","title":"学费支付","category":"出发前准备","keywords":["学费","留位费","押金","3500英镑","分期付款","CAS","开学前","缴费"],"questionExamples":["学费怎么交？","留位费是多少？","第二笔学费什么时候交？","可以分期付款吗？"],"shortAnswer":"第一笔学费是 3500 英镑留位费，建议尽早支付。第二笔学费是剩余学费，以 CAS 所示为准，建议开学前提前支付。","steps":["尽早支付第一笔 3500 英镑留位费。","查看 CAS 上显示的剩余学费金额。","开学前提前支付剩余学费。","如果需要分期付款，咨询桑德兰中国办老师。"],"materials":["CAS","学费支付信息","汇款或支付凭证"],"warnings":["剩余学费以 CAS 显示为准。","分期付款需要咨询桑德兰中国办老师。"],"sourcePages":"PDF 第 11 页"},{"id":"student-registration","title":"新生注册","category":"学习系统","keywords":["新生注册","eVision","邮箱","Canvas","Microsoft Teams","Teams","学生系统","线上注册"],"questionExamples":["新生注册要做什么？","入学前要注册哪些系统？","eVision是什么？","Canvas怎么用？"],"shortAnswer":"入学前每位新生都需要注册学校的各类线上系统，例如 eVision、电子邮箱、 "租房诈骗","学费或汇款诈骗"],"warnings":["政府部门不会电话索要转账或银行信息。","收到罚款信要通过官方电话核实，不要拨打信上的电话或点击陌生网址。","警惕短信链接要求输入银行卡密码或验证码。","不轻信高薪兼职广告。","避免先付费或泄露过多个人信息。","租房和付款请走正规渠道。"],"sourcePages":"PDF 第 53 页"},{"id":"fraud-response","title":"被诈骗怎么办","category":"安全防骗","keywords":["被骗了","被诈骗了","诈骗处理","报警","999","101","Action Fraud","Gateway","银行冻结","领保","使领馆"],"questionExamples":["被诈骗了怎么办？","在英国被骗了找谁？","英国报警电话是多少？","Action Fraud是什么？"],"shortAnswer":"如果遇到诈骗，要先保留证据，然后报警，联系 Action Fraud 和学校 Gateway 求助，必要时联系中国驻英使领馆，并及时联系银行冻结账户和追回可疑交易。","steps":["保留证据，包括聊天记录、通话记录、转账截图、对方账户信息。","报警，英国紧急报警电话为 999，非紧急报警电话为 101。","联系英国国家反诈骗中心 Action Fraud。","联系学校 Gateway 求助，学校工作人员可以协助报警或提供建议。","联系中国驻英使领馆。","及时联系银行，申请冻结账户并追回可疑交易。"],"materials":["聊天记录","通话记录","转账截图","对方账户信息","银行交易记录"],"links":["https://www.actionfraud.police.uk"],"warnings":["不要删除聊天记录和转账记录。","尽快联系银行处理可疑交易。","中国驻曼彻斯特总领馆领保电话：+44-161-224-8986。"],"sourcePages":"PDF 第 54 页"}];
      const categories = ["全部", "出发前准备", "签证与入境", "行李准备", "住宿交通", "银行卡电话卡", "学习系统", "校园服务", "安全防骗", "收藏"];
      const tags = ["CAS申请", "签证", "肺结核", "eVisa", "学费", "注册", "行李", "入境", "银行卡", "电话卡", "交通", "学习网站", "学生卡", "防诈骗", "被骗了", "不能带什么"];
      const recommendedIds = ["student-visa", "tb-test", "evisa-sharecode", "entry-documents", "bank-card-cash", "fraud-response"];
      const favoriteKey = "uos-guide-search-favorites";

      let query = "";
      let activeCategory = "全部";
      let favorites = readFavorites();

      const input = document.getElementById("searchInput");
      const results = document.getElementById("results");
      const resultTitle = document.getElementById("resultTitle");
      const resultKicker = document.getElementById("resultKicker");
      const resultCount = document.getElementById("resultCount");
      const favoritePanel = document.getElementById("favoritePanel");
      const favoriteCount = document.getElementById("favoriteCount");
      const favoriteSection = document.getElementById("favoriteSection");
      const toast = document.getElementById("toast");

      function readFavorites() {
        try { return JSON.parse(localStorage.getItem(favoriteKey)) || []; }
        catch { return []; }
      }

      function saveFavorites() {
        localStorage.setItem(favoriteKey, JSON.stringify(favorites));
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        }[char]));
      }

      function escapeRegex(value) {
        return value.replace(/[.*+?^\${}()|[\]\\]/g, "\\$&");
      }

      function highlight(value) {
        const text = escapeHtml(value);
        const trimmed = query.trim();
        if (!trimmed) return text;
        const terms = Array.from(new Set([trimmed, ...trimmed.split(/[\s,，、/]+/)].filter((term) => term.length >= 2)))
          .sort((a, b) => b.length - a.length)
          .map(escapeRegex);
        if (!terms.length) return text;
        return text.replace(new RegExp("(" + terms.join("|") + ")", "gi"), "<mark>$1</mark>");
      }

      function fieldText(item) {
        return [
          item.title,
          item.category,
          ...(item.keywords || []),
          ...(item.questionExamples || []),
          item.shortAnswer,
          ...(item.steps || []),
          ...(item.materials || []),
          ...(item.warnings || []),
          ...(item.links || []),
        ].join(" ").toLowerCase();
      }

      function scoreItem(item, rawQuery) {
        const q = rawQuery.trim().toLowerCase();
        if (!q) return 0;
        const fields = [
          [item.title, 80],
          [(item.keywords || []).join(" "), 65],
          [(item.questionExamples || []).join(" "), 55],
          [item.shortAnswer, 28],
          [(item.steps || []).join(" "), 14],
          [(item.materials || []).join(" "), 12],
          [(item.warnings || []).join(" "), 12],
          [(item.links || []).join(" "), 10],
        ];
        let score = 0;
        for (const [value, weight] of fields) {
          const text = String(value || "").toLowerCase();
          if (text.includes(q)) score += weight;
          for (const term of q.split(/[\s,，、/]+/).filter(Boolean)) {
            if (term.length >= 2 && text.includes(term)) score += Math.max(8, weight / 3);
          }
        }
        const all = fieldText(item);
        let fuzzyHits = 0;
        for (const char of q) {
          if (char.trim() && all.includes(char)) fuzzyHits += 1;
        }
        score += fuzzyHits / Math.max(1, q.length) * 8;
        return score;
      }

      function searchItems() {
        const trimmed = query.trim();
        let items = trimmed
          ? knowledge.map((item) => ({ item, score: scoreItem(item, trimmed) })).filter((entry) => entry.score > 6).sort((a, b) => b.score - a.score).map((entry) => entry.item)
          : knowledge;

        if (!trimmed && activeCategory === "全部") {
          items = recommendedIds.map((id) => knowledge.find((item) => item.id === id)).filter(Boolean);
        }
        if (activeCategory === "收藏") {
          items = items.filter((item) => favorites.includes(item.id));
        } else if (activeCategory !== "全部") {
          items = items.filter((item) => item.category === activeCategory);
        }
        return items;
      }

      function formatAnswer(item) {
        const numbered = (items) => items && items.length ? items.map((entry, index) => (index + 1) + ". " + entry).join("\n") : "无";
        const bulleted = (items) => items && items.length ? items.map((entry) => "- " + entry).join("\n") : "无";
        return [
          "【标题】", item.title, "",
          "【分类】", item.category, "",
          "【简答】", item.shortAnswer, "",
          "【步骤】", numbered(item.steps), "",
          "【材料】", bulleted(item.materials), "",
          "【注意事项】", bulleted(item.warnings), "",
          "【相关链接】", bulleted(item.links), "",
          "【来源】", item.sourcePages,
        ].join("\n");
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.opacity = "0";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        document.body.removeChild(area);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      function renderList(items) {
        if (!items.length) {
          const isFavorite = activeCategory === "收藏";
          results.innerHTML = '<div class="empty"><div><h3>' + (isFavorite ? "你还没有收藏问题" : "没有找到相关内容") + '</h3><p>' + (isFavorite ? "可以把常用的签证、入境、学生卡、防诈骗问题收藏起来，方便出发前快速查看。" : "你可以尝试搜索：签证、CAS、肺结核、eVisa、学生卡、银行卡、被骗了、不能带什么。") + "</p></div></div>";
          return;
        }
        results.innerHTML = items.map((item, index) => cardHtml(item, index)).join("");
      }

      function detailHtml(title, items, cls, ordered) {
        if (!items || !items.length) return "";
        const tag = ordered ? "ol" : "ul";
        return '<section class="detail ' + cls + '"><p class="detail-title">' + title + '</p><' + tag + '>' + items.map((entry) => "<li>" + escapeHtml(entry) + "</li>").join("") + "</" + tag + "></section>";
      }

      function cardHtml(item, index) {
        const isFavorite = favorites.includes(item.id);
        const links = item.links && item.links.length
          ? '<section class="detail"><p class="detail-title">相关链接</p><ul class="link-list">' + item.links.map((link) => '<li><a href="' + (/^https?:\/\//i.test(link) ? link : "https://" + link) + '" target="_blank" rel="noreferrer">' + escapeHtml(link) + '</a></li>').join("") + "</ul></section>"
          : "";
        return '<article class="card" data-id="' + item.id + '" style="animation-delay:' + Math.min(index * 35, 240) + 'ms">' +
          '<div class="card-top"><div><div class="meta"><span class="cat-chip">' + escapeHtml(item.category) + '</span><span class="source">' + escapeHtml(item.sourcePages) + '</span></div><h3>' + highlight(item.title) + '</h3></div>' +
          '<button class="fav ' + (isFavorite ? "active" : "") + '" data-action="favorite" aria-label="收藏">' + (isFavorite ? "★" : "☆") + '</button></div>' +
          '<p class="short">' + highlight(item.shortAnswer) + '</p>' +
          '<div class="details">' +
          detailHtml("步骤", item.steps, "steps", true) +
          detailHtml("材料", item.materials, "", false) +
          detailHtml("注意事项", item.warnings, "warn", false) +
          links +
          '</div>' +
          '<div class="actions"><button class="text-button" data-action="toggle">查看详情</button><button class="copy" data-action="copy">复制答案</button></div>' +
          '</article>';
      }

      function renderFavorites() {
        const favoriteItems = knowledge.filter((item) => favorites.includes(item.id));
        favoriteCount.textContent = favoriteItems.length + " 条";
        if (!favoriteItems.length) {
          favoritePanel.innerHTML = '<div class="empty"><div><h3>你还没有收藏问题</h3><p>可以把常用的签证、入境、学生卡、防诈骗问题收藏起来，方便出发前快速查看。</p></div></div>';
          return;
        }
        favoritePanel.innerHTML = '<div class="favorite-grid">' + favoriteItems.map((item) =>
          '<button class="favorite-card" data-fav-select="' + item.id + '"><span class="cat-chip">' + escapeHtml(item.category) + '</span><h3>' + escapeHtml(item.title) + '</h3><p>' + escapeHtml(item.shortAnswer) + '</p></button>'
        ).join("") + '</div>';
      }

      function renderCategories() {
        document.getElementById("categories").innerHTML = categories.map((category) =>
          '<button class="category ' + (category === activeCategory ? "active" : "") + '" data-category="' + category + '">' + category + '</button>'
        ).join("");
      }

      function render() {
        const items = searchItems();
        resultKicker.textContent = query.trim() ? "Query: " + query.trim() : "Curated from PDF";
        resultTitle.textContent = query.trim() ? "搜索结果" : (activeCategory === "全部" ? "推荐问题" : activeCategory);
        resultCount.textContent = items.length + " 条";
        favoriteSection.style.display = activeCategory === "收藏" ? "none" : "";
        renderCategories();
        renderList(items);
        renderFavorites();
      }

      document.getElementById("tags").innerHTML = tags.map((tag) => '<button class="tag" data-tag="' + tag + '">' + tag + '</button>').join("");
      document.getElementById("searchForm").addEventListener("submit", (event) => {
        event.preventDefault();
        query = input.value.trim();
        render();
      });
      input.addEventListener("input", () => {
        query = input.value;
        render();
      });
      document.addEventListener("click", async (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.tag) {
          query = target.dataset.tag;
          activeCategory = "全部";
          input.value = query;
          render();
          return;
        }
        if (target.dataset.category) {
          activeCategory = target.dataset.category;
          render();
          return;
        }
        if (target.dataset.favSelect) {
          const item = knowledge.find((entry) => entry.id === target.dataset.favSelect);
          if (item) {
            query = item.title;
            input.value = query;
            activeCategory = "全部";
            window.scrollTo({ top: 130, behavior: "smooth" });
            render();
          }
          return;
        }
        const card = target.closest(".card");
        if (!card) return;
        const item = knowledge.find((entry) => entry.id === card.dataset.id);
        if (!item) return;
        if (target.dataset.action === "favorite") {
          if (favorites.includes(item.id)) {
            favorites = favorites.filter((id) => id !== item.id);
            showToast("已取消收藏");
          } else {
            favorites = [...favorites, item.id];
            showToast("已加入收藏");
          }
          saveFavorites();
          render();
        }
        if (target.dataset.action === "toggle") {
          card.classList.toggle("open");
          target.textContent = card.classList.contains("open") ? "收起详情" : "查看详情";
        }
        if (target.dataset.action === "copy") {
          try {
            await copyText(formatAnswer(item));
            target.textContent = "已复制";
            showToast("已复制到剪贴板");
            setTimeout(() => target.textContent = "复制答案", 1400);
          } catch {
            showToast("复制失败，请检查浏览器权限");
          }
        }
      });

      render();
    </script>
